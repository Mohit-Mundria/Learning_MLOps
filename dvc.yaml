stages:
  data_ingestion:
    cmd: python src/data_ingestion.py
    deps:
      - src/data_ingestion.py
      - src/utility_code/utility_func.py
    outs:
      - data_save/raw/raw_dataset.csv
  

  data_preprocessing:
    cmd: python src/data_preprocessing.py
    deps:
      - src/data_preprocessing.py
      - data_save/raw/raw_dataset.csv
      - src/utility_code/utility_func.py
    outs:
      - data_save/processed/train.csv
      - data_save/processed/test.csv
  

  # feature_engineering:
  #   cmd: python src/feature_engineering.py
  #   deps:
  #     - src/feature_engineering.py
  #     - data_save/processed/data.csv
  #   outs:
  #     - data_save/featured_data/data.csv
  

  model_training:
    cmd: python src/model_training.py
    deps:
      - src/model_training.py
      - data_save/processed/train.csv
      - src/utility_code/utility_func.py
    outs:
      - model_registry/model.pkl
    